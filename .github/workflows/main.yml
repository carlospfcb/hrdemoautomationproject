name: Playwright + Postman + Allure

on:
  push:
  pull_request:

jobs:
  tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Browsers
        run: npx playwright install --with-deps

      # ▶️ PLAYWRIGHT TESTS (genera allure-results)
      - name: Run Playwright tests
        run: npx playwright test

      # ▶️ Generar Allure report HTML
      - name: Generate Allure report
        run: |
          npx allure generate allure-results --clean -o allure-report

      # ▶️ Subir Allure report como artifact
      - name: Upload Allure report
        uses: actions/upload-artifact@v4
        with:
          name: allure-report
          path: allure-report

      # ▶️ POSTMAN TESTS (Newman)
      - name: Install Newman
        run: npm install -g newman

      - name: Run Postman collection
        run: |
          newman run "hrdemoautomationproject/apitests/Disney_API.postman_collection.json"
