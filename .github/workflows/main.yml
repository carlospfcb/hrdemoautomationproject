name: Playwright Tests

on:
  push:
    branches: [ main, crpdev ]
  pull_request:
    branches: [ main, crpdev ]
  workflow_dispatch: # Esto te permite ejecutarlo manualmente para probar

jobs:
  test:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm' # Acelera las ejecuciones futuras

      - name: Install dependencies
        run: npm ci # Usa 'ci' en lugar de 'install' para entornos de CI

      - name: Install Playwright Browsers
        run: npx playwright install --with-deps

      - name: Run Playwright tests
        run: npx playwright test tests # Apunta específicamente a tu carpeta 'tests'

      - name: Generate Allure Report
        if: always()
        run: |
          # Instalamos localmente para evitar problemas de permisos globales
          npm install allure-commandline --save-dev 
          npx allure generate allure-results --clean -o allure-report

      - name: Upload Allure Artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-report
          path: allure-report/
          retention-days: 30
